<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Color</title>
    <link rel="stylesheet" href="./reset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="hero">
        <section
            <svg class="wave wave1" viewBox="0 0 120 40">
            <path d="M0 20 Q 15 5, 30 20 T 60 20 T 90 20 T 120 20"/>
            </svg>

            <svg class="wave wave2" viewBox="0 0 120 40">
                <path d="M0 20 Q 20 8, 40 20 T 80 20 T 120 20"/>
            </svg>

            <svg class="wave wave3" viewBox="0 0 120 40">
                <path d="M0 20 Q 15 12, 30 20 T 60 20 T 90 20 T 120 20"/>
            </svg>

        </section>

        
        <section class="hero-content">
            <h1>ColorFly</h1>
            <p>El color de tus sueños empieza aquí</p>

            <a href="#color-section" class="goTo">Generar Colores</a>
            
                
            </section>


    </header>
    <main>
        <section id="color-section" class="container"></section>

        <section class="controls">
            <fieldset class="choice">
                <input type="radio" id="6-colores" name="Choice" value="6.colores" checked>
                <label for="6-colores">6 Colores</label>

                <input type="radio" id="8-colores" name="Choice" value="8.colores">
                <label for="8-colores">8 Colores</label>

                <input type="radio" id="9-colores" name="Choice" value="9.colores">
                <label for="9-colores">9 Colores</label>

            </fieldset>
            <select name="format" id="format">
                <option value="RGB">RGB</option>
                <option value="HSL" selected>HSL</option>
            </select>
            <button class="refresh">Generar Colores</button>

        </section>
        
        <div id="toast"></div>
        
            
    </main>

    
</body>
<script src="./script.js" defer></script>
</html>
