<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <main>
        <section class="container">
            <article class="box">
                <div class="color-box"></div>      
                <span class="color-code">#38D5BE</span>
            </article>

            <article class="box">

            </article>

        <section class="controls">
            <fieldset class="choice">
                <input type="radio" id="3-colores" name="Choice" value="3.colores" checked>
                <label for="3-colores">3 Colores</label>

                <input type="radio" id="6-colores" name="Choice" value="6.colores">
                <label for="6-colores">6 Colores</label>

                <input type="radio" id="9-colores" name="Choice" value="9.colores">
                <label for="9-colores">9 Colores</label>

            </fieldset>
            <select name="format" id="format">
                <option value="HEX">HEX</option>
                <option value="RGB">RGB</option>
                <option value="HSL" selected>HSL</option>
            </select>
            <button class="refresh">Generar Colores</button>

        </section>
